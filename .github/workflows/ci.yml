name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  fmt-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format
      - name: clang-format
        run: |
          find src tests bench -name '*.cpp' -o -name '*.h' | \
            xargs clang-format --dry-run --Werror

  build-gcc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install
        run: sudo apt-get update && sudo apt-get install -y cmake g++ ninja-build
      - name: configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER=g++
      - name: build
        run: cmake --build build
      - name: test
        run: ctest --test-dir build --output-on-failure

  build-clang:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install
        run: sudo apt-get update && sudo apt-get install -y cmake clang ninja-build
      - name: configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER=clang++
      - name: build
        run: cmake --build build
      - name: test
        run: ctest --test-dir build --output-on-failure

  asan-ubsan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install
        run: sudo apt-get update && sudo apt-get install -y cmake clang ninja-build
      - name: configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug -DOBFIX_ASAN=ON -DCMAKE_CXX_COMPILER=clang++
      - name: build
        run: cmake --build build
      - name: test
        run: ctest --test-dir build --output-on-failure

  tsan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install
        run: sudo apt-get update && sudo apt-get install -y cmake clang ninja-build
      - name: configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug -DOBFIX_TSAN=ON -DCMAKE_CXX_COMPILER=clang++
      - name: build
        run: cmake --build build
      - name: test
        run: ctest --test-dir build --output-on-failure

  fuzz-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install
        run: sudo apt-get update && sudo apt-get install -y cmake clang ninja-build
      - name: configure
        run: cmake -S . -B build -G Ninja -DOBFIX_FUZZ=ON -DCMAKE_CXX_COMPILER=clang++
      - name: build
        run: cmake --build build --target fix_parser_fuzz
      - name: smoke
        run: ./build/fix_parser_fuzz -max_total_time=20 -runs=5000

  bench-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install
        run: sudo apt-get update && sudo apt-get install -y cmake g++ ninja-build
      - name: configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
      - name: build
        run: cmake --build build --target replay_bench
      - name: smoke
        run: ./build/replay_bench --smoke

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: build image
        run: docker build -t obfix-test .
